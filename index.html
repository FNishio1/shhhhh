<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Imagen</title>

<style>

body{
  margin:0;
  background:#f5f1e8;
  height:100vh;
  overflow-y:auto;
}

/* CONTENEDOR */

.image-box{
position:relative;
width:100%;
height:150vh;
}

/* IMAGEN */

.mi-imagen{
position:absolute;

/* TAMAÑO */
width:500px;

/* POSICIÓN */
top:200px;
left:100px;

object-fit:contain;
}

</style>
</head>

<body>

<div class="image-box">

<img src="./images/webekeko1.png" class="mi-imagen">

</div>

</body>
</html>
